observer_node:
  ros__parameters:

    joint_name: rev_crank
    publish_rate: 200.0

    # ── Plant model ─────────────────────────────────────────
    # Devono corrispondere a dynamics_params.yaml
    fric_visc: 2.0          # [Nm·s/rad]
    fric_coul: 2.0          # [Nm]
    fric_eps: 0.005         # [rad/s]
    damping_theta: 1.0      # [Nm·s/rad]

    # ── Observer 1 — Luenberger (canale 3: encoder) ─────────
    obs1_pole_1: -15.0
    obs1_pole_2: -20.0

    # ── Observer 2 — Force Balance (canale 0: sensore forza) ─
    # alpha_acc: EMA sul dirty-derivative di θ̇ per stimare θ̈
    #   0.02 = molto filtrato (poco rumore, ~250ms ritardo)
    #   0.05 = meno filtrato (più rumore, ~100ms ritardo)
    obs2_alpha_acc: 0.02

    # alpha_tau: EMA su τ̂_ext stimato
    #   0.05 = ben filtrato (detection ~200ms)
    #   0.10 = più reattivo (detection ~100ms, più rumoroso)
    obs2_alpha_tau: 0.05

    # ── Filtri residui ──────────────────────────────────────
    residual_filter_alpha: 0.05
    rms_window: 50