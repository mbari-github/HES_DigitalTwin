ekf_observer:
  ros__parameters:
    joint_name:    'rev_crank'
    dt:            0.005
    publish_rate:  200.0

    # Timeout canali osservazione [s]
    # Se un canale non riceve messaggi entro questo tempo
    # il filtro passa in predict-only per quello stato
    obs_timeout_sec: 0.5

    # Covarianza iniziale
    P0_theta:      0.0001
    P0_theta_dot:  0.001
    P0_tau_ext:    1.0

    # Rumore di processo Q
    q_theta:       0.000001
    q_theta_dot:   0.001
    q_tau_ext:     0.1

    # Rumore di misura R
    r_theta:       0.0001
    r_theta_dot:   0.001
    r_tau_ext:     0.01

    # Soglie affidabilità — se P[i,i] supera questa soglia
    # la stima di quello stato non è più considerata affidabile
    # (health[7,8,9] passa a 0.0)
    P_theta_unreliable:     0.01
    P_theta_dot_unreliable: 0.1
    P_tau_ext_unreliable:   10.0